      <style>
        .container {
          font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
          font-size: 13px;
          line-height: 1.42;
          padding: 20px;
          background-color: #0d1117;
          border: 1px solid #30363d;
          border-radius: 6px;
          color: #c9d1d9;
          display: table;
          width: calc(100% - 40px);
          height: calc(100% - 40px);
          box-sizing: border-box;
        }

        .ascii-column {
          display: table-cell;
          vertical-align: top;
          width: 50%;
          white-space: pre;
          color: #8b949e;
          font-size: 8.3px;
          line-height: 1.1;
          letter-spacing: 0.1px;
        }

        .info-column {
          display: table-cell;
          vertical-align: top;
          width: 50%;
          white-space: pre;
          padding-left: 40px;
        }

        .highlight { color: #ff7b72; }
        .cyan { color: #a5d6ff; }
        .green { color: #7ee787; }
        .yellow { color: #f2cc60; }
      </style>

